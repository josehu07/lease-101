name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install dx CLI
        # Pin to the version this project builds against.
        run: cargo install dioxus-cli --version 0.7.9 --locked

      - name: Build web (release)
        working-directory: web
        run: dx build --platform web --release

      - name: Add CNAME for custom domain
        run: echo "bodega-consensus.com" > target/dx/lease_web/release/web/public/CNAME

      - name: SPA deep-link fallback
        # GitHub Pages serves 404.html for any unmatched path. Copying the shell
        # there lets client-side routes (e.g. /sim) survive direct hits/refreshes:
        # the WASM boots and the router resolves the URL.
        run: cp target/dx/lease_web/release/web/public/index.html target/dx/lease_web/release/web/public/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/dx/lease_web/release/web/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
